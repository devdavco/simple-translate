<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
    }
    h3 {
      margin-top: 0;
      color: #4285f4;
      font-size: 18px;
    }
    label {
      display: block;
      margin: 12px 0 5px;
      font-weight: bold;
      font-size: 14px;
    }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #3367d6;
    }
    .info {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
      line-height: 1.5;
    }
    .shortcut {
      font-family: monospace;
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h3>⚡ Simple Translate</h3>
  
  <label for="sourceLang">Idioma origen:</label>
  <select id="sourceLang">
    <option value="en">Inglés</option>
    <option value="es">Español</option>
    <option value="fr">Francés</option>
    <option value="de">Alemán</option>
    <option value="it">Italiano</option>
    <option value="pt">Portugués</option>
    <option value="ru">Ruso</option>
    <option value="ja">Japonés</option>
    <option value="zh-CN">Chino (Simplificado)</option>
    <option value="auto">Detectar automáticamente</option>
  </select>
  
  <label for="targetLang">Idioma destino:</label>
  <select id="targetLang">
    <option value="es">Español</option>
    <option value="en">Inglés</option>
    <option value="fr">Francés</option>
    <option value="de">Alemán</option>
    <option value="it">Italiano</option>
    <option value="pt">Portugués</option>
    <option value="ru">Ruso</option>
    <option value="ja">Japonés</option>
    <option value="zh-CN">Chino (Simplificado)</option>
  </select>
  
  <label for="ttsLang">Idioma de audio:</label>
  <select id="ttsLang">
    <option value="en-US">Inglés (US)</option>
    <option value="en-GB">Inglés (UK)</option>
    <option value="es-ES">Español</option>
    <option value="fr-FR">Francés</option>
    <option value="de-DE">Alemán</option>
    <option value="it-IT">Italiano</option>
    <option value="pt-BR">Portugués (Brasil)</option>
    <option value="ru-RU">Ruso</option>
    <option value="ja-JP">Japonés</option>
    <option value="zh-CN">Chino (Simplificado)</option>
  </select>
  
  <button id="saveBtn">💾 Guardar Configuración</button>
  
  <div class="info">
    <strong>Atajos de teclado:</strong><br>
    <span class="shortcut">Cmd+Shift+1</span> (Mac)<br>
    <span class="shortcut">Ctrl+Shift+1</span> (Windows/Linux)<br>
    → Traducir selección<br><br>
    <span class="shortcut">Cmd+Shift+2</span> (Mac)<br>
    <span class="shortcut">Ctrl+Shift+2</span> (Windows/Linux)<br>
    → Escuchar pronunciación
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
